name: replay

on:
  push:
  pull_request:

jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependency
        run: python -m pip install -r requirements.txt
      - name: Package check
        run: python -B scripts/check_public_package.py --check
      - name: Replay verify
        run: python -B scripts/replay_all.py --verify
      - name: Pytest
        run: python -B -m pytest -q -p no:cacheprovider tests
